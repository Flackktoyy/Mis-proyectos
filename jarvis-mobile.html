<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b14">
<title>JARVIS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#070b14;color:#cce0ff;font-family:'Courier New',monospace;user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto;padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,0) 0}

#header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
#header-title{font-size:13px;color:#00d4ff;letter-spacing:3px;text-transform:uppercase;transition:color 0.3s, text-shadow 0.3s}
#header-right{display:flex;align-items:center;gap:10px}
#opus-btn{background:none;border:1px solid #00d4ff35;color:#00d4ff80;border-radius:6px;padding:4px 9px;font-size:10px;letter-spacing:1.5px;cursor:pointer;font-family:'Courier New',monospace;font-weight:bold;transition:all 0.3s}
#opus-btn.active{background:#3a0d0d;border-color:#ff1744;color:#ff5252;box-shadow:0 0 8px #ff174455}
#status-dot{width:8px;height:8px;border-radius:50%;background:#ff4444;transition:background 0.4s}
#status-dot.online{background:#00ff88;box-shadow:0 0 6px #00ff8880}

body.opus-mode #header-title{color:#ff5252;text-shadow:0 0 8px #ff174450}
body.opus-mode #orb{border-color:#ff5252;background:radial-gradient(circle at 38% 35%,#ff5252,#aa0033 55%,#280000);box-shadow:0 0 22px #ff5252,0 0 44px #ff174450,inset 0 0 14px #ff174450}
body.opus-mode #r1{border-color:#ff525245}
body.opus-mode #r2{border-color:#ff525270}
body.opus-mode #r3{border-color:#ff5252aa}
body.opus-mode #orb-label{color:#ff525266}
body.opus-mode #orb-icon{text-shadow:0 0 8px #ff1744}

#chat{flex:1;overflow-y:auto;padding:10px 20px;display:flex;flex-direction:column;gap:10px}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:#0d3050;border-radius:3px}

.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.55;animation:fadeIn 0.25s ease}
.msg.user{align-self:flex-end;background:#001e3a;border:1px solid #00d4ff25;color:#99ccee;border-bottom-right-radius:3px}
.msg.jarvis{align-self:flex-start;background:#020d1a;border:1px solid #00d4ff18;color:#cce0ff;border-bottom-left-radius:3px}
.msg.jarvis::before{content:'J ·  ';color:#00d4ff55;font-size:11px;letter-spacing:1px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

#orb-zone{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:6px 0 4px}
#orb-wrap{position:relative;width:106px;height:106px;cursor:pointer}

.ring{position:absolute;border-radius:50%;border:1px solid #00d4ff;top:50%;left:50%;transform:translate(-50%,-50%)}
#r1{width:106px;height:106px;border-color:#00d4ff45;animation:pulse1 3s ease-in-out infinite}
#r2{width:82px;height:82px;border-color:#00d4ff70;animation:pulse2 3s ease-in-out infinite 0.4s}
#r3{width:60px;height:60px;border-color:#00d4ffaa;animation:pulse2 3s ease-in-out infinite 0.8s}
#orb{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#00d4ff,#0055aa 55%,#001428);border:2px solid #00d4ff;box-shadow:0 0 22px #00d4ff,0 0 44px #00d4ff50,inset 0 0 14px #00d4ff50;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.3s;display:flex;align-items:center;justify-content:center}
#orb-icon{font-size:16px;color:#fff;text-shadow:0 0 8px #00d4ff;transition:all 0.3s}

@keyframes pulse1{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4}50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.7}}
@keyframes pulse2{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1.04);opacity:0.9}}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes orbListen{0%,100%{box-shadow:0 0 18px #00ff8840,inset 0 0 12px #00ff8820}50%{box-shadow:0 0 34px #00ff8880,inset 0 0 20px #00ff8840}}
@keyframes orbThink{0%,100%{box-shadow:0 0 18px #ffaa0040,inset 0 0 12px #ffaa0020}50%{box-shadow:0 0 30px #ffaa0080,inset 0 0 18px #ffaa0040}}

#orb-wrap.listening #orb{animation:orbListen 0.8s ease-in-out infinite;border-color:#00ff88;background:radial-gradient(circle at 38% 35%,#00ff88,#005533 55%,#001428);box-shadow:0 0 22px #00ff88,0 0 44px #00ff8860}
#orb-wrap.listening #r1{border-color:#00ff8855;animation:pulse1 0.8s ease-in-out infinite}
#orb-wrap.listening #r2{border-color:#00ff8880;animation:pulse2 0.8s ease-in-out infinite}
#orb-wrap.listening #r3{border-color:#00ff88bb;animation:pulse2 0.8s ease-in-out infinite}
#orb-wrap.thinking #orb{animation:orbThink 1.2s ease-in-out infinite;border-color:#ffaa0066}
#orb-wrap.thinking #r1{animation:spin 4s linear infinite;border-color:#ffaa0015}
#orb-wrap.thinking #r2{animation:spin 2.5s linear infinite reverse;border-color:#ffaa0025}
#orb-wrap.thinking #r3{animation:spin 1.8s linear infinite;border-color:#ffaa0040}

#orb-label{font-size:11px;color:#00d4ff55;letter-spacing:2px;text-transform:uppercase;margin-top:8px;min-height:16px;transition:all 0.3s}

#input-zone{flex-shrink:0;padding:10px 16px 20px;display:flex;gap:10px;align-items:flex-end}
#text-input{flex:1;background:#010c18;border:1px solid #00d4ff25;border-radius:10px;padding:11px 14px;color:#cce0ff;font-family:'Courier New',monospace;font-size:14px;resize:none;outline:none;max-height:100px;line-height:1.4;transition:border-color 0.2s}
#text-input:focus{border-color:#00d4ff55}
#text-input::placeholder{color:#1a3a55}
#send-btn{width:44px;height:44px;border-radius:10px;background:#001828;border:1px solid #00d4ff35;color:#00d4ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
#send-btn:active{background:#002a44}
#mic-btn{width:44px;height:44px;border-radius:10px;background:#001828;border:1px solid #00d4ff35;color:#00d4ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
#mic-btn.active{background:#003020;border-color:#00ff8870;color:#00ff88}
#mic-btn:active{background:#002040}

#cfg-btn{position:fixed;top:14px;right:16px;background:none;border:none;color:#00d4ff30;font-size:18px;cursor:pointer;padding:4px}
#cfg-panel{display:none;position:fixed;inset:0;background:#070b14ee;z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#cfg-panel.open{display:flex}
#cfg-panel h3{color:#00d4ff;font-size:15px;letter-spacing:2px;margin-bottom:20px}
#cfg-url{width:100%;background:#010c18;border:1px solid #00d4ff35;border-radius:8px;padding:12px 14px;color:#cce0ff;font-size:13px;font-family:'Courier New',monospace;outline:none;margin-bottom:12px}
.cfg-row{display:flex;gap:10px;width:100%}
.cfg-btn{flex:1;padding:11px;border-radius:8px;border:1px solid #00d4ff35;background:#001828;color:#00d4ff;font-size:13px;cursor:pointer}
.cfg-btn.primary{background:#002a44;border-color:#00d4ff55}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <span id="header-title">JARVIS</span>
    <div id="header-right">
      <button id="opus-btn" onclick="toggleOpus()">◆ OPUS</button>
      <div id="status-dot"></div>
    </div>
  </div>

  <div id="chat"></div>

  <div id="orb-zone">
    <div id="orb-wrap" onclick="orbClick()">
      <div class="ring" id="r1"></div>
      <div class="ring" id="r2"></div>
      <div class="ring" id="r3"></div>
      <div id="orb"><span id="orb-icon">◈</span></div>
    </div>
    <div id="orb-label">toca para hablar</div>
  </div>

  <div id="input-zone">
    <textarea id="text-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
    <button id="mic-btn" onclick="toggleMic()">🎤</button>
    <button id="send-btn" onclick="sendText()">↑</button>
  </div>
</div>

<button id="cfg-btn" onclick="openCfg()">⚙</button>
<div id="cfg-panel">
  <h3>CONFIGURACIÓN</h3>
  <input id="cfg-url" type="text" placeholder="http://192.168.x.x:3100">
  <div class="cfg-row">
    <button class="cfg-btn" onclick="closeCfg()">Cancelar</button>
    <button class="cfg-btn primary" onclick="saveCfg()">Guardar</button>
  </div>
</div>

<script>
const SESSION = 'jarvis-' + Math.random().toString(36).slice(2,8);
let serverUrl = window.location.origin;
let recognition = null;
let isListening = false;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

let forceOpus = false;
let opusOffTimer = null;
const OPUS_AUTO_OFF_MS = 5 * 60 * 1000;

function toggleOpus() {
  forceOpus = !forceOpus;
  document.body.classList.toggle('opus-mode', forceOpus);
  document.getElementById('opus-btn').classList.toggle('active', forceOpus);
  if (forceOpus) {
    addMsg('Modo OPUS activado. Auto-apagado en 5 min sin uso.', 'jarvis');
    resetOpusTimer();
  } else {
    addMsg('Modo OPUS desactivado.', 'jarvis');
    if (opusOffTimer) { clearTimeout(opusOffTimer); opusOffTimer = null; }
  }
}

function resetOpusTimer() {
  if (opusOffTimer) clearTimeout(opusOffTimer);
  opusOffTimer = setTimeout(() => {
    if (forceOpus) {
      forceOpus = false;
      document.body.classList.remove('opus-mode');
      document.getElementById('opus-btn').classList.remove('active');
      addMsg('Modo OPUS desactivado automáticamente (5 min sin uso).', 'jarvis');
    }
    opusOffTimer = null;
  }, OPUS_AUTO_OFF_MS);
}

const orbWrap = document.getElementById('orb-wrap');
const orbLabel = document.getElementById('orb-label');
const chat = document.getElementById('chat');
const dot = document.getElementById('status-dot');
const textInput = document.getElementById('text-input');
const micBtn = document.getElementById('mic-btn');

function setOrbState(state) {
  orbWrap.className = state;
  if (state === 'listening') orbLabel.textContent = 'escuchando...';
  else if (state === 'thinking') orbLabel.textContent = 'procesando...';
  else orbLabel.textContent = 'toca para hablar';
}

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  if (forceOpus) resetOpusTimer();
  addMsg(text, 'user');
  setOrbState('thinking');
  try {
    const res = await fetch(serverUrl + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: SESSION, model: forceOpus ? 'opus' : null })
    });
    const data = await res.json();
    const reply = data.reply || data.error || 'Sin respuesta';
    setOrbState('');
    addMsg(reply, 'jarvis');
    speak(reply);
  } catch (err) {
    setOrbState('');
    addMsg('Error conectando con JARVIS en la PC.', 'jarvis');
  }
}

let currentAudio = null;

function speak(text) {
  const clean = text.replace(/[*#_`]/g, '');
  if (isIOS) speakIOS(clean);
  else speakAndroid(clean);
}

function speakIOS(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'es-MX';
    utter.rate = 1.05;
    utter.pitch = 0.9;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
  }, 100);
}

function speakAndroid(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const chunks = [];
  let rem = text;
  while (rem.length > 0) {
    if (rem.length <= 190) { chunks.push(rem); break; }
    let cut = rem.lastIndexOf(' ', 190);
    if (cut < 0) cut = 190;
    chunks.push(rem.slice(0, cut));
    rem = rem.slice(cut).trim();
  }
  let i = 0;
  function playNext() {
    if (i >= chunks.length) return;
    const url = serverUrl + '/tts?text=' + encodeURIComponent(chunks[i]);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { i++; playNext(); };
    audio.onerror = () => { i++; playNext(); };
    audio.play().catch(() => { i++; playNext(); });
  }
  playNext();
}

function speak(text) {
  if (!synth) return;
  synth.cancel();
  setTimeout(() => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'es-MX';
    utter.rate = 1.05;
    utter.pitch = 0.9;
    utter.volume = 1;
    synth.speak(utter);
  }, 120);
}

function sendText() {
  const msg = textInput.value.trim();
  if (!msg) return;
  textInput.value = '';
  textInput.style.height = 'auto';
  sendMessage(msg);
}

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});
textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 100) + 'px';
});

function startListening() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { addMsg('Este navegador no soporta voz. Usa Chrome.', 'jarvis'); return; }
  if (isListening) return;

  const r = new SpeechRec();
  r.lang = 'es-MX';
  r.continuous = false;
  r.interimResults = false;

  r.onstart = () => {
    isListening = true;
    setOrbState('listening');
    micBtn.classList.add('active');
  };
  r.onresult = e => {
    const transcript = e.results[0][0].transcript;
    if (transcript.trim()) sendMessage(transcript.trim());
  };
  r.onerror = err => {
    if (err.error !== 'no-speech') addMsg('Error de micrófono: ' + err.error, 'jarvis');
    resetMic();
  };
  r.onend = () => resetMic();

  try { r.start(); recognition = r; }
  catch (e) { addMsg('No se pudo iniciar el micrófono.', 'jarvis'); resetMic(); }
}

function resetMic() {
  isListening = false;
  recognition = null;
  if (orbWrap.className === 'listening') setOrbState('');
  micBtn.classList.remove('active');
}

function orbClick() { startListening(); }
function toggleMic() { startListening(); }

async function checkStatus() {
  try {
    const res = await fetch(serverUrl + '/status', { signal: AbortSignal.timeout(3000) });
    const data = await res.json();
    dot.className = data.ok ? 'online' : '';
  } catch {
    dot.className = '';
  }
}

function openCfg() {
  document.getElementById('cfg-url').value = serverUrl;
  document.getElementById('cfg-panel').classList.add('open');
}
function closeCfg() {
  document.getElementById('cfg-panel').classList.remove('open');
}
function saveCfg() {
  const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  if (url) { serverUrl = url; }
  closeCfg();
  checkStatus();
}

checkStatus();
setInterval(checkStatus, 15000);
addMsg('Sistema en línea. Listo para recibir instrucciones.', 'jarvis');
</script>
</body>
</html>
